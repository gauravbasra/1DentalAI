server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 162.243.186.191 _;
    client_max_body_size 25m;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name 1dentalai.com www.1dentalai.com app.1dentalai.com go.1dentalai.com;
    return 301 https://$host$request_uri;
}

# 1dentalai.com → port 3001 (marketing site, 1DentalAI repo)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1dentalai.com www.1dentalai.com go.1dentalai.com;
    client_max_body_size 25m;

    ssl_certificate /etc/letsencrypt/live/1dentalai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1dentalai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

