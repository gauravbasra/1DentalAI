name: Deploy 1DentalAI to DigitalOcean

on:
  workflow_dispatch:

concurrency:
  group: deploy-1dentalai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          test -n "${{ secrets.DO_SSH_HOST }}"
          test -n "${{ secrets.DO_SSH_USER }}"
          test -n "${{ secrets.DO_SSH_PRIVATE_KEY }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync release to droplet
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            -e "ssh -p ${DEPLOY_PORT} -i ~/.ssh/do_deploy_key" \
            ./ "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:${DEPLOY_PATH}/"

      - name: Install and restart 1DentalAI service
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            npm ci --omit=dev
            npm run build
            install -m 0644 ops/systemd/1dentalai.service /etc/systemd/system/1dentalai.service
            install -m 0644 ops/nginx/1dentalai.conf /etc/nginx/sites-available/1dentalai.conf
            ln -sfn /etc/nginx/sites-available/1dentalai.conf /etc/nginx/sites-enabled/1dentalai.conf
            rm -f /etc/nginx/sites-enabled/default
            systemctl daemon-reload
            systemctl enable 1dentalai.service
            systemctl restart 1dentalai.service
            nginx -t
            systemctl reload nginx
            curl -fsS http://127.0.0.1:3001/api/health
          EOF

      - name: Verify public health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/1dentalai-health.json -w "%{http_code}" "http://${{ secrets.DO_SSH_HOST }}/api/health" || true)
            if [ "$code" = "200" ]; then
              cat /tmp/1dentalai-health.json
              exit 0
            fi
            sleep 4
          done
          cat /tmp/1dentalai-health.json || true
          exit 1
