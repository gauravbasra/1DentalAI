name: Deploy 1DentalAI to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-1dentalai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: PMS production gates
        run: npm run test:pms

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          test -n "${{ secrets.DO_SSH_HOST }}"
          test -n "${{ secrets.DO_SSH_USER }}"
          test -n "${{ secrets.DO_SSH_PRIVATE_KEY }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          for i in 1 2 3 4 5; do
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts && break
            sleep 3
          done

      - name: Sync release to droplet
        run: |
          for i in 1 2 3 4 5 6; do
            rsync -az --delete \
              --exclude='.git' \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='.next/cache' \
              -e "ssh -p ${DEPLOY_PORT} -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60 -o ConnectionAttempts=3 -o ServerAliveInterval=20 -o ServerAliveCountMax=6" \
              ./ "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:${DEPLOY_PATH}/" && exit 0
            sleep 20
          done
          exit 1

      - name: Provision database and run migrations
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          ZOOM_WEBHOOK_SECRET_TOKEN: ${{ secrets.ZOOM_WEBHOOK_SECRET_TOKEN }}
          CONNECTOR_SECRET_KEY: ${{ secrets.CONNECTOR_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_WEBCHAT_MODEL: ${{ secrets.OPENAI_WEBCHAT_MODEL }}
          OPENAI_BAA_ENABLED: ${{ secrets.OPENAI_BAA_ENABLED }}
          OPENAI_PHI_ALLOWED: ${{ secrets.OPENAI_PHI_ALLOWED }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_WEBHOOK_BASE_URL: ${{ secrets.TWILIO_WEBHOOK_BASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN }}
          POSTMARK_FROM_EMAIL: ${{ secrets.POSTMARK_FROM_EMAIL }}
          NEXHEALTH_API_KEY: ${{ secrets.NEXHEALTH_API_KEY != '' && secrets.NEXHEALTH_API_KEY || secrets.NEXHEALTH }}
          NEXHEALTH_BASE_URL: ${{ secrets.NEXHEALTH_BASE_URL }}
          NEXHEALTH_SUBDOMAIN: ${{ secrets.NEXHEALTH_SUBDOMAIN }}
          NEXHEALTH_SUBDOMAIN_OR_ORG_ID: ${{ secrets.NEXHEALTH_SUBDOMAIN_OR_ORG_ID }}
          PMS_SYNC_SOURCE: ${{ secrets.PMS_SYNC_SOURCE }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          ZOOM_ACCOUNT_ID_B64="$(printf '%s' "${ZOOM_ACCOUNT_ID:-}" | base64 -w 0)"
          ZOOM_CLIENT_ID_B64="$(printf '%s' "${ZOOM_CLIENT_ID:-}" | base64 -w 0)"
          ZOOM_CLIENT_SECRET_B64="$(printf '%s' "${ZOOM_CLIENT_SECRET:-}" | base64 -w 0)"
          ZOOM_SECRET_B64="$(printf '%s' "${ZOOM_WEBHOOK_SECRET_TOKEN:-}" | base64 -w 0)"
          CONNECTOR_SECRET_KEY_B64="$(printf '%s' "${CONNECTOR_SECRET_KEY:-}" | base64 -w 0)"
          OPENAI_API_KEY_B64="$(printf '%s' "${OPENAI_API_KEY:-}" | base64 -w 0)"
          OPENAI_WEBCHAT_MODEL_B64="$(printf '%s' "${OPENAI_WEBCHAT_MODEL:-}" | base64 -w 0)"
          OPENAI_BAA_ENABLED_B64="$(printf '%s' "${OPENAI_BAA_ENABLED:-}" | base64 -w 0)"
          OPENAI_PHI_ALLOWED_B64="$(printf '%s' "${OPENAI_PHI_ALLOWED:-}" | base64 -w 0)"
          ELEVENLABS_API_KEY_B64="$(printf '%s' "${ELEVENLABS_API_KEY:-}" | base64 -w 0)"
          TWILIO_ACCOUNT_SID_B64="$(printf '%s' "${TWILIO_ACCOUNT_SID:-}" | base64 -w 0)"
          TWILIO_AUTH_TOKEN_B64="$(printf '%s' "${TWILIO_AUTH_TOKEN:-}" | base64 -w 0)"
          TWILIO_FROM_NUMBER_B64="$(printf '%s' "${TWILIO_FROM_NUMBER:-}" | base64 -w 0)"
          TWILIO_WEBHOOK_BASE_URL_B64="$(printf '%s' "${TWILIO_WEBHOOK_BASE_URL:-}" | base64 -w 0)"
          GOOGLE_MAPS_API_KEY_B64="$(printf '%s' "${GOOGLE_MAPS_API_KEY:-}" | base64 -w 0)"
          RESEND_API_KEY_B64="$(printf '%s' "${RESEND_API_KEY:-}" | base64 -w 0)"
          RESEND_FROM_EMAIL_B64="$(printf '%s' "${RESEND_FROM_EMAIL:-}" | base64 -w 0)"
          SENDGRID_API_KEY_B64="$(printf '%s' "${SENDGRID_API_KEY:-}" | base64 -w 0)"
          SENDGRID_FROM_EMAIL_B64="$(printf '%s' "${SENDGRID_FROM_EMAIL:-}" | base64 -w 0)"
          POSTMARK_SERVER_TOKEN_B64="$(printf '%s' "${POSTMARK_SERVER_TOKEN:-}" | base64 -w 0)"
          POSTMARK_FROM_EMAIL_B64="$(printf '%s' "${POSTMARK_FROM_EMAIL:-}" | base64 -w 0)"
          NEXHEALTH_API_KEY_B64="$(printf '%s' "${NEXHEALTH_API_KEY:-}" | base64 -w 0)"
          NEXHEALTH_BASE_URL_B64="$(printf '%s' "${NEXHEALTH_BASE_URL:-}" | base64 -w 0)"
          NEXHEALTH_SUBDOMAIN_B64="$(printf '%s' "${NEXHEALTH_SUBDOMAIN:-}" | base64 -w 0)"
          NEXHEALTH_SUBDOMAIN_OR_ORG_ID_B64="$(printf '%s' "${NEXHEALTH_SUBDOMAIN_OR_ORG_ID:-}" | base64 -w 0)"
          PMS_SYNC_SOURCE_B64="$(printf '%s' "${PMS_SYNC_SOURCE:-NEXHEALTH}" | base64 -w 0)"
          STRIPE_SECRET_KEY_B64="$(printf '%s' "${STRIPE_SECRET_KEY:-}" | base64 -w 0)"
          STRIPE_WEBHOOK_SECRET_B64="$(printf '%s' "${STRIPE_WEBHOOK_SECRET:-}" | base64 -w 0)"
          for i in 1 2 3; do
            timeout 600s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            sudo systemctl start docker || true
            if [ ! -f .env ] || ! grep -q '^DB_PASSWORD_ENCODING=hex$' .env; then
              docker compose -f docker-compose.yml -f docker-compose.public.yml stop postgres || true
              docker compose -f docker-compose.yml -f docker-compose.public.yml rm -f postgres || true
              docker volume rm 1dentalai_1dentalai-postgres-data || true
              DB_PASSWORD="\$(openssl rand -hex 32)"
              {
                echo "POSTGRES_DB=dentalai_prod"
                echo "POSTGRES_USER=dentalai_app"
                echo "POSTGRES_PASSWORD=\${DB_PASSWORD}"
                echo "DB_PASSWORD_ENCODING=hex"
                echo "DATABASE_URL=postgresql://dentalai_app:\${DB_PASSWORD}@postgres:5432/dentalai_prod?schema=public"
              } > .env
              chmod 600 .env
            fi
            if [ -n "${ZOOM_SECRET_B64}" ]; then
              ZOOM_SECRET_VALUE="\$(printf '%s' "${ZOOM_SECRET_B64}" | base64 -d)"
              if grep -q '^ZOOM_WEBHOOK_SECRET_TOKEN=' .env; then
                sed -i "s|^ZOOM_WEBHOOK_SECRET_TOKEN=.*|ZOOM_WEBHOOK_SECRET_TOKEN=\${ZOOM_SECRET_VALUE}|" .env
              else
                printf '\\nZOOM_WEBHOOK_SECRET_TOKEN=%s\\n' "\${ZOOM_SECRET_VALUE}" >> .env
              fi
            fi
            if [ -n "${ZOOM_ACCOUNT_ID_B64}" ]; then
              ZOOM_ACCOUNT_ID_VALUE="\$(printf '%s' "${ZOOM_ACCOUNT_ID_B64}" | base64 -d)"
              if grep -q '^ZOOM_ACCOUNT_ID=' .env; then sed -i "s|^ZOOM_ACCOUNT_ID=.*|ZOOM_ACCOUNT_ID=\${ZOOM_ACCOUNT_ID_VALUE}|" .env; else printf '\\nZOOM_ACCOUNT_ID=%s\\n' "\${ZOOM_ACCOUNT_ID_VALUE}" >> .env; fi
            fi
            if [ -n "${ZOOM_CLIENT_ID_B64}" ]; then
              ZOOM_CLIENT_ID_VALUE="\$(printf '%s' "${ZOOM_CLIENT_ID_B64}" | base64 -d)"
              if grep -q '^ZOOM_CLIENT_ID=' .env; then sed -i "s|^ZOOM_CLIENT_ID=.*|ZOOM_CLIENT_ID=\${ZOOM_CLIENT_ID_VALUE}|" .env; else printf '\\nZOOM_CLIENT_ID=%s\\n' "\${ZOOM_CLIENT_ID_VALUE}" >> .env; fi
            fi
            if [ -n "${ZOOM_CLIENT_SECRET_B64}" ]; then
              ZOOM_CLIENT_SECRET_VALUE="\$(printf '%s' "${ZOOM_CLIENT_SECRET_B64}" | base64 -d)"
              if grep -q '^ZOOM_CLIENT_SECRET=' .env; then sed -i "s|^ZOOM_CLIENT_SECRET=.*|ZOOM_CLIENT_SECRET=\${ZOOM_CLIENT_SECRET_VALUE}|" .env; else printf '\\nZOOM_CLIENT_SECRET=%s\\n' "\${ZOOM_CLIENT_SECRET_VALUE}" >> .env; fi
            fi
            if [ -n "${CONNECTOR_SECRET_KEY_B64}" ]; then
              CONNECTOR_SECRET_KEY_VALUE="\$(printf '%s' "${CONNECTOR_SECRET_KEY_B64}" | base64 -d)"
              if grep -q '^CONNECTOR_SECRET_KEY=' .env; then sed -i "s|^CONNECTOR_SECRET_KEY=.*|CONNECTOR_SECRET_KEY=\${CONNECTOR_SECRET_KEY_VALUE}|" .env; else printf '\\nCONNECTOR_SECRET_KEY=%s\\n' "\${CONNECTOR_SECRET_KEY_VALUE}" >> .env; fi
            elif ! grep -q '^CONNECTOR_SECRET_KEY=' .env; then
              printf '\\nCONNECTOR_SECRET_KEY=%s\\n' "\$(openssl rand -hex 32)" >> .env
            fi
            if ! grep -q '^AUTH_SECRET=' .env; then
              printf '\\nAUTH_SECRET=%s\\n' "\$(openssl rand -hex 32)" >> .env
            fi
            if [ -n "${OPENAI_API_KEY_B64}" ]; then
              OPENAI_API_KEY_VALUE="\$(printf '%s' "${OPENAI_API_KEY_B64}" | base64 -d)"
              if grep -q '^OPENAI_API_KEY=' .env; then sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=\${OPENAI_API_KEY_VALUE}|" .env; else printf '\\nOPENAI_API_KEY=%s\\n' "\${OPENAI_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${OPENAI_WEBCHAT_MODEL_B64}" ]; then
              OPENAI_WEBCHAT_MODEL_VALUE="\$(printf '%s' "${OPENAI_WEBCHAT_MODEL_B64}" | base64 -d)"
              if grep -q '^OPENAI_WEBCHAT_MODEL=' .env; then sed -i "s|^OPENAI_WEBCHAT_MODEL=.*|OPENAI_WEBCHAT_MODEL=\${OPENAI_WEBCHAT_MODEL_VALUE}|" .env; else printf '\\nOPENAI_WEBCHAT_MODEL=%s\\n' "\${OPENAI_WEBCHAT_MODEL_VALUE}" >> .env; fi
            fi
            if [ -n "${OPENAI_BAA_ENABLED_B64}" ]; then
              OPENAI_BAA_ENABLED_VALUE="\$(printf '%s' "${OPENAI_BAA_ENABLED_B64}" | base64 -d)"
              if grep -q '^OPENAI_BAA_ENABLED=' .env; then sed -i "s|^OPENAI_BAA_ENABLED=.*|OPENAI_BAA_ENABLED=\${OPENAI_BAA_ENABLED_VALUE}|" .env; else printf '\\nOPENAI_BAA_ENABLED=%s\\n' "\${OPENAI_BAA_ENABLED_VALUE}" >> .env; fi
            fi
            if [ -n "${OPENAI_PHI_ALLOWED_B64}" ]; then
              OPENAI_PHI_ALLOWED_VALUE="\$(printf '%s' "${OPENAI_PHI_ALLOWED_B64}" | base64 -d)"
              if grep -q '^OPENAI_PHI_ALLOWED=' .env; then sed -i "s|^OPENAI_PHI_ALLOWED=.*|OPENAI_PHI_ALLOWED=\${OPENAI_PHI_ALLOWED_VALUE}|" .env; else printf '\\nOPENAI_PHI_ALLOWED=%s\\n' "\${OPENAI_PHI_ALLOWED_VALUE}" >> .env; fi
            fi
            if [ -n "${ELEVENLABS_API_KEY_B64}" ]; then
              ELEVENLABS_API_KEY_VALUE="\$(printf '%s' "${ELEVENLABS_API_KEY_B64}" | base64 -d)"
              if grep -q '^ELEVENLABS_API_KEY=' .env; then sed -i "s|^ELEVENLABS_API_KEY=.*|ELEVENLABS_API_KEY=\${ELEVENLABS_API_KEY_VALUE}|" .env; else printf '\\nELEVENLABS_API_KEY=%s\\n' "\${ELEVENLABS_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${TWILIO_ACCOUNT_SID_B64}" ]; then
              TWILIO_ACCOUNT_SID_VALUE="\$(printf '%s' "${TWILIO_ACCOUNT_SID_B64}" | base64 -d)"
              if grep -q '^TWILIO_ACCOUNT_SID=' .env; then sed -i "s|^TWILIO_ACCOUNT_SID=.*|TWILIO_ACCOUNT_SID=\${TWILIO_ACCOUNT_SID_VALUE}|" .env; else printf '\\nTWILIO_ACCOUNT_SID=%s\\n' "\${TWILIO_ACCOUNT_SID_VALUE}" >> .env; fi
            fi
            if [ -n "${TWILIO_AUTH_TOKEN_B64}" ]; then
              TWILIO_AUTH_TOKEN_VALUE="\$(printf '%s' "${TWILIO_AUTH_TOKEN_B64}" | base64 -d)"
              if grep -q '^TWILIO_AUTH_TOKEN=' .env; then sed -i "s|^TWILIO_AUTH_TOKEN=.*|TWILIO_AUTH_TOKEN=\${TWILIO_AUTH_TOKEN_VALUE}|" .env; else printf '\\nTWILIO_AUTH_TOKEN=%s\\n' "\${TWILIO_AUTH_TOKEN_VALUE}" >> .env; fi
            fi
            if [ -n "${TWILIO_FROM_NUMBER_B64}" ]; then
              TWILIO_FROM_NUMBER_VALUE="\$(printf '%s' "${TWILIO_FROM_NUMBER_B64}" | base64 -d)"
              if grep -q '^TWILIO_FROM_NUMBER=' .env; then sed -i "s|^TWILIO_FROM_NUMBER=.*|TWILIO_FROM_NUMBER=\${TWILIO_FROM_NUMBER_VALUE}|" .env; else printf '\\nTWILIO_FROM_NUMBER=%s\\n' "\${TWILIO_FROM_NUMBER_VALUE}" >> .env; fi
            fi
            if [ -n "${TWILIO_WEBHOOK_BASE_URL_B64}" ]; then
              TWILIO_WEBHOOK_BASE_URL_VALUE="\$(printf '%s' "${TWILIO_WEBHOOK_BASE_URL_B64}" | base64 -d)"
              if grep -q '^TWILIO_WEBHOOK_BASE_URL=' .env; then sed -i "s|^TWILIO_WEBHOOK_BASE_URL=.*|TWILIO_WEBHOOK_BASE_URL=\${TWILIO_WEBHOOK_BASE_URL_VALUE}|" .env; else printf '\\nTWILIO_WEBHOOK_BASE_URL=%s\\n' "\${TWILIO_WEBHOOK_BASE_URL_VALUE}" >> .env; fi
            fi
            if [ -n "${GOOGLE_MAPS_API_KEY_B64}" ]; then
              GOOGLE_MAPS_API_KEY_VALUE="\$(printf '%s' "${GOOGLE_MAPS_API_KEY_B64}" | base64 -d)"
              if grep -q '^GOOGLE_MAPS_API_KEY=' .env; then sed -i "s|^GOOGLE_MAPS_API_KEY=.*|GOOGLE_MAPS_API_KEY=\${GOOGLE_MAPS_API_KEY_VALUE}|" .env; else printf '\\nGOOGLE_MAPS_API_KEY=%s\\n' "\${GOOGLE_MAPS_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${RESEND_API_KEY_B64}" ]; then
              RESEND_API_KEY_VALUE="\$(printf '%s' "${RESEND_API_KEY_B64}" | base64 -d)"
              if grep -q '^RESEND_API_KEY=' .env; then sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=\${RESEND_API_KEY_VALUE}|" .env; else printf '\\nRESEND_API_KEY=%s\\n' "\${RESEND_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${RESEND_FROM_EMAIL_B64}" ]; then
              RESEND_FROM_EMAIL_VALUE="\$(printf '%s' "${RESEND_FROM_EMAIL_B64}" | base64 -d)"
              if grep -q '^RESEND_FROM_EMAIL=' .env; then sed -i "s|^RESEND_FROM_EMAIL=.*|RESEND_FROM_EMAIL=\${RESEND_FROM_EMAIL_VALUE}|" .env; else printf '\\nRESEND_FROM_EMAIL=%s\\n' "\${RESEND_FROM_EMAIL_VALUE}" >> .env; fi
            fi
            if [ -n "${SENDGRID_API_KEY_B64}" ]; then
              SENDGRID_API_KEY_VALUE="\$(printf '%s' "${SENDGRID_API_KEY_B64}" | base64 -d)"
              if grep -q '^SENDGRID_API_KEY=' .env; then sed -i "s|^SENDGRID_API_KEY=.*|SENDGRID_API_KEY=\${SENDGRID_API_KEY_VALUE}|" .env; else printf '\\nSENDGRID_API_KEY=%s\\n' "\${SENDGRID_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${SENDGRID_FROM_EMAIL_B64}" ]; then
              SENDGRID_FROM_EMAIL_VALUE="\$(printf '%s' "${SENDGRID_FROM_EMAIL_B64}" | base64 -d)"
              if grep -q '^SENDGRID_FROM_EMAIL=' .env; then sed -i "s|^SENDGRID_FROM_EMAIL=.*|SENDGRID_FROM_EMAIL=\${SENDGRID_FROM_EMAIL_VALUE}|" .env; else printf '\\nSENDGRID_FROM_EMAIL=%s\\n' "\${SENDGRID_FROM_EMAIL_VALUE}" >> .env; fi
            fi
            if [ -n "${POSTMARK_SERVER_TOKEN_B64}" ]; then
              POSTMARK_SERVER_TOKEN_VALUE="\$(printf '%s' "${POSTMARK_SERVER_TOKEN_B64}" | base64 -d)"
              if grep -q '^POSTMARK_SERVER_TOKEN=' .env; then sed -i "s|^POSTMARK_SERVER_TOKEN=.*|POSTMARK_SERVER_TOKEN=\${POSTMARK_SERVER_TOKEN_VALUE}|" .env; else printf '\\nPOSTMARK_SERVER_TOKEN=%s\\n' "\${POSTMARK_SERVER_TOKEN_VALUE}" >> .env; fi
            fi
            if [ -n "${POSTMARK_FROM_EMAIL_B64}" ]; then
              POSTMARK_FROM_EMAIL_VALUE="\$(printf '%s' "${POSTMARK_FROM_EMAIL_B64}" | base64 -d)"
              if grep -q '^POSTMARK_FROM_EMAIL=' .env; then sed -i "s|^POSTMARK_FROM_EMAIL=.*|POSTMARK_FROM_EMAIL=\${POSTMARK_FROM_EMAIL_VALUE}|" .env; else printf '\\nPOSTMARK_FROM_EMAIL=%s\\n' "\${POSTMARK_FROM_EMAIL_VALUE}" >> .env; fi
            fi
            if [ -n "${NEXHEALTH_API_KEY_B64}" ]; then
              NEXHEALTH_API_KEY_VALUE="\$(printf '%s' "${NEXHEALTH_API_KEY_B64}" | base64 -d)"
              if grep -q '^NEXHEALTH_API_KEY=' .env; then sed -i "s|^NEXHEALTH_API_KEY=.*|NEXHEALTH_API_KEY=\${NEXHEALTH_API_KEY_VALUE}|" .env; else printf '\\nNEXHEALTH_API_KEY=%s\\n' "\${NEXHEALTH_API_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${NEXHEALTH_BASE_URL_B64}" ]; then
              NEXHEALTH_BASE_URL_VALUE="\$(printf '%s' "${NEXHEALTH_BASE_URL_B64}" | base64 -d)"
              if grep -q '^NEXHEALTH_BASE_URL=' .env; then sed -i "s|^NEXHEALTH_BASE_URL=.*|NEXHEALTH_BASE_URL=\${NEXHEALTH_BASE_URL_VALUE}|" .env; else printf '\\nNEXHEALTH_BASE_URL=%s\\n' "\${NEXHEALTH_BASE_URL_VALUE}" >> .env; fi
            fi
            if [ -n "${NEXHEALTH_SUBDOMAIN_B64}" ]; then
              NEXHEALTH_SUBDOMAIN_VALUE="\$(printf '%s' "${NEXHEALTH_SUBDOMAIN_B64}" | base64 -d)"
              if grep -q '^NEXHEALTH_SUBDOMAIN=' .env; then sed -i "s|^NEXHEALTH_SUBDOMAIN=.*|NEXHEALTH_SUBDOMAIN=\${NEXHEALTH_SUBDOMAIN_VALUE}|" .env; else printf '\\nNEXHEALTH_SUBDOMAIN=%s\\n' "\${NEXHEALTH_SUBDOMAIN_VALUE}" >> .env; fi
            fi
            if [ -n "${NEXHEALTH_SUBDOMAIN_OR_ORG_ID_B64}" ]; then
              NEXHEALTH_SUBDOMAIN_OR_ORG_ID_VALUE="\$(printf '%s' "${NEXHEALTH_SUBDOMAIN_OR_ORG_ID_B64}" | base64 -d)"
              if grep -q '^NEXHEALTH_SUBDOMAIN_OR_ORG_ID=' .env; then sed -i "s|^NEXHEALTH_SUBDOMAIN_OR_ORG_ID=.*|NEXHEALTH_SUBDOMAIN_OR_ORG_ID=\${NEXHEALTH_SUBDOMAIN_OR_ORG_ID_VALUE}|" .env; else printf '\\nNEXHEALTH_SUBDOMAIN_OR_ORG_ID=%s\\n' "\${NEXHEALTH_SUBDOMAIN_OR_ORG_ID_VALUE}" >> .env; fi
            fi
            PMS_SYNC_SOURCE_VALUE="\$(printf '%s' "${PMS_SYNC_SOURCE_B64}" | base64 -d)"
            if grep -q '^PMS_SYNC_SOURCE=' .env; then sed -i "s|^PMS_SYNC_SOURCE=.*|PMS_SYNC_SOURCE=\${PMS_SYNC_SOURCE_VALUE}|" .env; else printf '\\nPMS_SYNC_SOURCE=%s\\n' "\${PMS_SYNC_SOURCE_VALUE}" >> .env; fi
            if [ -n "${STRIPE_SECRET_KEY_B64}" ]; then
              STRIPE_SECRET_KEY_VALUE="\$(printf '%s' "${STRIPE_SECRET_KEY_B64}" | base64 -d)"
              if grep -q '^STRIPE_SECRET_KEY=' .env; then sed -i "s|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=\${STRIPE_SECRET_KEY_VALUE}|" .env; else printf '\\nSTRIPE_SECRET_KEY=%s\\n' "\${STRIPE_SECRET_KEY_VALUE}" >> .env; fi
            fi
            if [ -n "${STRIPE_WEBHOOK_SECRET_B64}" ]; then
              STRIPE_WEBHOOK_SECRET_VALUE="\$(printf '%s' "${STRIPE_WEBHOOK_SECRET_B64}" | base64 -d)"
              if grep -q '^STRIPE_WEBHOOK_SECRET=' .env; then sed -i "s|^STRIPE_WEBHOOK_SECRET=.*|STRIPE_WEBHOOK_SECRET=\${STRIPE_WEBHOOK_SECRET_VALUE}|" .env; else printf '\\nSTRIPE_WEBHOOK_SECRET=%s\\n' "\${STRIPE_WEBHOOK_SECRET_VALUE}" >> .env; fi
            fi
            if ! grep -q '^NEXT_PUBLIC_APP_URL=' .env; then printf '\\nNEXT_PUBLIC_APP_URL=https://app.1dentalai.com\\n' >> .env; fi
            if ! grep -q '^NEXT_PUBLIC_SITE_URL=' .env; then printf '\\nNEXT_PUBLIC_SITE_URL=https://1dentalai.com\\n' >> .env; fi
            # Start postgres — try Docker first, fall back to local postgres
            DOCKER_OK=false
            sudo systemctl start docker 2>/dev/null && sleep 5 && sudo systemctl is-active --quiet docker && DOCKER_OK=true || true
            if \$DOCKER_OK; then
              docker compose -f docker-compose.yml -f docker-compose.public.yml up -d postgres
              sleep 8
              echo "Using Docker postgres"
            else
              sudo systemctl start postgresql 2>/dev/null || true
              # Ensure DB and user exist for local postgres
              DB_PASS="\$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
              sudo -u postgres psql -c "CREATE USER dentalai_app WITH PASSWORD '\${DB_PASS}';" 2>/dev/null || true
              sudo -u postgres psql -c "CREATE DATABASE dentalai_prod OWNER dentalai_app;" 2>/dev/null || true
              sudo -u postgres psql -c "GRANT ALL ON DATABASE dentalai_prod TO dentalai_app;" 2>/dev/null || true
              echo "Using local postgres"
            fi
            # Run migrations — use localhost when Docker is unavailable
            set -a; source .env; set +a
            if ! \$DOCKER_OK; then
              export DATABASE_URL="\$(echo \$DATABASE_URL | sed 's|@postgres:|@localhost:|g')"
            fi
            npm ci --prefer-offline 2>/dev/null || npm ci
            (npx prisma migrate resolve --rolled-back 202605210110_platform_admin_rbac || true)
            (npx prisma migrate resolve --rolled-back 202605221910_activate_webchat_openai || true)
            npx prisma migrate deploy
            node prisma/seed-modules.mjs
          EOF
            sleep 10
          done
          exit 1

      - name: Install and restart 1DentalAI service
        run: |
          for i in 1 2 3; do
            timeout 900s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            which pm2 || npm install -g pm2
            pm2 delete 1dentalai 2>/dev/null || true
            set -a; source .env; set +a
            # Use localhost DB if Docker not running
            systemctl is-active --quiet docker || export DATABASE_URL="\$(echo \$DATABASE_URL | sed 's|@postgres:|@localhost:|g')"
            PORT=3001 pm2 start .next/standalone/server.js --name 1dentalai --env production \
              --env DATABASE_URL="\$DATABASE_URL"
            pm2 save
            pm2 startup systemd -u root --hp /root 2>/dev/null | tail -1 | bash 2>/dev/null || true
            for i in 1 2 3 4 5; do
              curl -fsS http://127.0.0.1:3001/api/health && break
              sleep 5
            done
            curl -fsS http://127.0.0.1:3001/api/health
            curl -fsS http://127.0.0.1:3001/api/database/health
          EOF
            sleep 10
          done
          exit 1

      - name: Install public domain proxy
        run: |
          for i in 1 2 3; do
            timeout 240s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            sudo apt-get update
            sudo apt-get install -y nginx certbot python3-certbot-nginx
            test -f /etc/letsencrypt/live/1dentalai.com/fullchain.pem
            test -f /etc/letsencrypt/live/1dentalai.com/privkey.pem
            sudo cp ops/nginx/1dentalai.conf /etc/nginx/sites-available/1dentalai.conf
            sudo ln -sf /etc/nginx/sites-available/1dentalai.conf /etc/nginx/sites-enabled/1dentalai.conf
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl enable --now nginx || true
            sudo systemctl reload nginx || sudo nginx -s reload || true
          EOF
            sleep 10
          done
          exit 1

      - name: Verify public health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/1dentalai-health.json -w "%{http_code}" "https://app.1dentalai.com/api/health" || true)
            if [ "$code" = "200" ] && grep -q '"app":"1DentalAI"' /tmp/1dentalai-health.json; then
              cat /tmp/1dentalai-health.json
              exit 0
            fi
            sleep 4
          done
          cat /tmp/1dentalai-health.json || true
          exit 1

      - name: Verify public database health
        run: |
          curl -fsS "https://app.1dentalai.com/api/database/health"
