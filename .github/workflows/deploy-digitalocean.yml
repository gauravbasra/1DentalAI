name: Deploy 1DentalAI to DigitalOcean

on:
  workflow_dispatch:

concurrency:
  group: deploy-1dentalai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          test -n "${{ secrets.DO_SSH_HOST }}"
          test -n "${{ secrets.DO_SSH_USER }}"
          test -n "${{ secrets.DO_SSH_PRIVATE_KEY }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          for i in 1 2 3 4 5; do
            ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts && break
            sleep 3
          done

      - name: Sync release to droplet
        run: |
          for i in 1 2 3; do
            rsync -az --delete \
              --exclude='.git' \
              --exclude='.env' \
              --exclude='node_modules' \
              --exclude='.next/cache' \
              -e "ssh -p ${DEPLOY_PORT} -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
              ./ "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:${DEPLOY_PATH}/" && exit 0
            sleep 10
          done
          exit 1

      - name: Provision database and run migrations
        run: |
          for i in 1 2 3; do
            timeout 600s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            if [ ! -f .env ] || ! grep -q '^DB_PASSWORD_ENCODING=hex$' .env; then
              docker compose -f docker-compose.yml -f docker-compose.public.yml stop postgres || true
              docker compose -f docker-compose.yml -f docker-compose.public.yml rm -f postgres || true
              docker volume rm 1dentalai_1dentalai-postgres-data || true
              DB_PASSWORD="\$(openssl rand -hex 32)"
              {
                echo "POSTGRES_DB=dentalai_prod"
                echo "POSTGRES_USER=dentalai_app"
                echo "POSTGRES_PASSWORD=\${DB_PASSWORD}"
                echo "DB_PASSWORD_ENCODING=hex"
                echo "DATABASE_URL=postgresql://dentalai_app:\${DB_PASSWORD}@postgres:5432/dentalai_prod?schema=public"
              } > .env
              chmod 600 .env
            fi
            docker compose -f docker-compose.yml -f docker-compose.public.yml up -d postgres
            docker compose -f docker-compose.yml -f docker-compose.public.yml --profile migrate run -T --rm migrate sh -c 'npm ci && (npx prisma migrate resolve --rolled-back 202605210110_platform_admin_rbac || true) && npx prisma migrate deploy' < /dev/null
          EOF
            sleep 10
          done
          exit 1

      - name: Install and restart 1DentalAI service
        run: |
          for i in 1 2 3; do
            timeout 240s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            docker compose -f docker-compose.yml -f docker-compose.public.yml up -d --build app
            for i in 1 2 3 4 5; do
              curl -fsS http://127.0.0.1:3001/api/health && break
              sleep 3
            done
            curl -fsS http://127.0.0.1:3001/api/health
            curl -fsS http://127.0.0.1:3001/api/database/health
          EOF
            sleep 10
          done
          exit 1

      - name: Install public domain proxy
        run: |
          for i in 1 2 3; do
            timeout 240s ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << EOF && exit 0
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            sudo apt-get update
            sudo apt-get install -y nginx certbot python3-certbot-nginx
            if sudo systemctl is-active --quiet nginx || ! sudo ss -ltnp | grep -q ':80 '; then
              sudo cp ops/nginx/1dentalai.conf /etc/nginx/sites-available/1dentalai.conf
              sudo ln -sf /etc/nginx/sites-available/1dentalai.conf /etc/nginx/sites-enabled/1dentalai.conf
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t
              sudo systemctl enable --now nginx || true
              sudo systemctl reload nginx || sudo nginx -s reload || true
              if sudo systemctl is-active --quiet nginx && getent ahosts 1dentalai.com www.1dentalai.com app.1dentalai.com | awk '{print \$1}' | grep -Eq '^(162\.243\.186\.191|2604:a880:800:14:0:2:eca0:e000)$'; then
                sudo certbot --nginx --non-interactive --agree-tos --redirect \
                  -m hello@1dentalai.com \
                  -d 1dentalai.com -d www.1dentalai.com -d app.1dentalai.com || true
                sudo nginx -t
                sudo systemctl reload nginx || true
              fi
            else
              echo "Port 80 is already handled by an existing proxy; leaving it in place."
              sudo ss -ltnp | grep ':80 ' || true
            fi
          EOF
            sleep 10
          done
          exit 1

      - name: Verify public health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/1dentalai-health.json -w "%{http_code}" "http://${{ secrets.DO_SSH_HOST }}/api/health" || true)
            if [ "$code" = "200" ] && grep -q '"app":"1DentalAI"' /tmp/1dentalai-health.json; then
              cat /tmp/1dentalai-health.json
              exit 0
            fi
            sleep 4
          done
          cat /tmp/1dentalai-health.json || true
          exit 1

      - name: Verify public database health
        run: |
          curl -fsS "http://${{ secrets.DO_SSH_HOST }}/api/database/health"
