name: Cleanup QA Data

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Remove QA form data
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" <<EOF
            set -e
            cd "${DEPLOY_PATH}"
            docker compose -f docker-compose.yml -f docker-compose.public.yml exec -T postgres psql -U dentalai_app -d dentalai_prod <<'SQL'
              delete from "PmsProfileChangeRequest" where "proposedValue" ilike '%QA validation%';
              delete from "PmsFormResponseAnswer" where "answerValue" ilike '%QA validation%';
              delete from "PmsFormResponse"
                where "assignmentId" = 'formassign_sample_010_medical'
                  and "id" not in (select "responseId" from "PmsFormResponseAnswer");
              delete from "PmsAllergy" where "allergen" ilike '%QA validation%';
              update "PmsFormAssignment"
                set "status" = 'ASSIGNED', "completedAt" = null, "updatedAt" = current_timestamp
                where "id" = 'formassign_sample_010_medical';
SQL
          EOF
