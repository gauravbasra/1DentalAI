name: Emergency Server Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix Docker and restart app
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << 'EOF'
          set -e

          echo "=== Disk usage ==="
          df -h

          echo "=== Docker journal ==="
          journalctl -u docker --no-pager -n 30 || true

          echo "=== Fixing Docker ==="
          # Try running dockerd directly to see the real error
          timeout 5 dockerd --validate 2>&1 || true

          # Full purge and reinstall
          systemctl stop docker || true
          apt-get remove -y docker.io docker-ce docker-ce-cli containerd.io 2>/dev/null || true
          rm -f /var/lib/docker/buildkit/containerd.sock 2>/dev/null || true
          rm -f /run/containerd/containerd.sock 2>/dev/null || true

          # Install Docker CE from official repo
          apt-get install -y ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --batch --yes
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
          apt-get update -q
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

          systemctl daemon-reload
          systemctl enable docker
          systemctl start docker

          echo "=== Docker status ==="
          systemctl status docker --no-pager | tail -5

          echo "=== Starting containers ==="
          cd /var/www/1DentalAI
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d postgres
          sleep 5
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d app

          echo "=== Reloading nginx ==="
          systemctl reload nginx || true

          echo "=== Health check ==="
          sleep 5
          curl -fsS http://127.0.0.1:3001/api/health || echo "App not yet healthy"

          echo "=== DONE ==="
          EOF
