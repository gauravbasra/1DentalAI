name: Emergency Server Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix server and restart app
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << 'EOF'
          set -e

          echo "=== System info ==="
          free -h
          df -h /

          echo "=== Add 2GB swap if missing ==="
          if ! swapon --show | grep -q '/swapfile'; then
            fallocate -l 2G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=2048
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            grep -q swapfile /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            echo "Swap created OK"
          else
            swapon /swapfile 2>/dev/null || true
            echo "Swap already active"
          fi
          free -h

          echo "=== Install PM2 ==="
          which pm2 || npm install -g pm2

          echo "=== Check postgres ==="
          if systemctl is-active --quiet postgresql; then
            echo "Local postgres already running"
          elif systemctl start postgresql 2>/dev/null && sleep 2 && systemctl is-active --quiet postgresql; then
            echo "Local postgres started"
          else
            echo "Installing local postgres"
            apt-get install -y -q postgresql postgresql-contrib
            systemctl enable postgresql
            systemctl start postgresql
          fi

          echo "=== Setup database if needed ==="
          cd "${DEPLOY_PATH}"
          if [ -f .env ]; then
            DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2-)
            echo "DATABASE_URL found in .env"
          fi

          echo "=== Run app with PM2 ==="
          cd "${DEPLOY_PATH}"
          # Source env
          set -a; source .env 2>/dev/null || true; set +a
          # Kill old pm2 process if running
          pm2 delete 1dentalai 2>/dev/null || true
          # Start standalone Next.js
          PORT=3001 pm2 start .next/standalone/server.js --name 1dentalai
          pm2 save
          # Ensure PM2 restarts on reboot
          pm2 startup systemd -u root --hp /root 2>/dev/null | tail -1 | bash 2>/dev/null || true

          echo "=== Reload nginx ==="
          systemctl reload nginx || true

          sleep 5
          echo "=== Health check ==="
          curl -fsS http://127.0.0.1:3001/api/health && echo "" || echo "Not healthy yet — check: pm2 logs 1dentalai"

          echo "=== DONE ==="
          EOF
