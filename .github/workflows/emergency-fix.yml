name: Emergency Server Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix server and restart app
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << 'EOF'
          set -e

          echo "=== System info ==="
          free -h
          df -h /

          echo "=== Add 2GB swap if missing ==="
          if ! swapon --show | grep -q '/swapfile'; then
            fallocate -l 2G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=2048
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            grep -q swapfile /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
            echo "Swap created OK"
          else
            swapon /swapfile 2>/dev/null || true
            echo "Swap already active"
          fi
          free -h

          echo "=== Install PM2 ==="
          which pm2 || npm install -g pm2

          echo "=== Check postgres ==="
          if systemctl is-active --quiet postgresql; then
            echo "Local postgres already running"
          elif systemctl start postgresql 2>/dev/null && sleep 2 && systemctl is-active --quiet postgresql; then
            echo "Local postgres started"
          else
            echo "Installing local postgres"
            apt-get install -y -q postgresql postgresql-contrib
            systemctl enable postgresql
            systemctl start postgresql
          fi

          echo "=== Setup database if needed ==="
          cd "${DEPLOY_PATH}"
          if [ -f .env ]; then
            DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2-)
            echo "DATABASE_URL found in .env"
          fi

          echo "=== Check deploy dir ==="
          ls -la "${DEPLOY_PATH}/" 2>/dev/null | head -20 || echo "Deploy dir not found or empty"
          ls -la "${DEPLOY_PATH}/.next/standalone/" 2>/dev/null | head -5 || echo ".next/standalone not present yet — deploy needed"

          echo "=== PM2 status ==="
          pm2 list 2>/dev/null || true

          echo "=== PM2 logs (last 30 lines) ==="
          pm2 logs 1dentalai --lines 30 --nostream 2>/dev/null || true

          echo "=== PM2 logs ==="
          pm2 logs 1dentalai --lines 40 --nostream 2>/dev/null || echo "no pm2 logs"

          echo "=== standalone node_modules check ==="
          ls /var/www/1DentalAI/.next/standalone/node_modules/ 2>/dev/null | grep pg || echo "no pg in standalone"

          echo "=== Fix DATABASE_URL in .env ==="
          cd /var/www/1DentalAI
          sed -i 's|@postgres:5432|@localhost:5432|g' .env 2>/dev/null || true
          grep 'DATABASE_URL' .env | sed 's/PASSWORD=[^@]*/PASSWORD=***/' || true

          echo "=== Ensure local postgres is configured ==="
          systemctl start postgresql 2>/dev/null || true
          DB_PASS="$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)"
          DB_URL="$(grep '^DATABASE_URL=' .env | cut -d= -f2-)"
          # Allow password auth in pg_hba.conf
          if ! grep -q 'dentalai_app' /etc/postgresql/*/main/pg_hba.conf 2>/dev/null; then
            echo "host dentalai_prod dentalai_app 127.0.0.1/32 md5" >> /etc/postgresql/*/main/pg_hba.conf
            echo "local dentalai_prod dentalai_app md5" >> /etc/postgresql/*/main/pg_hba.conf
            systemctl reload postgresql
          fi
          sudo -u postgres psql -c "CREATE USER dentalai_app WITH PASSWORD '${DB_PASS}';" 2>/dev/null || \
            sudo -u postgres psql -c "ALTER USER dentalai_app WITH PASSWORD '${DB_PASS}';"
          sudo -u postgres psql -c "CREATE DATABASE dentalai_prod OWNER dentalai_app;" 2>/dev/null || true
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE dentalai_prod TO dentalai_app;" 2>/dev/null || true

          echo "=== Run migrations ==="
          set -a; source .env; set +a
          npx prisma migrate deploy 2>&1 | tail -5 || true
          node prisma/seed-modules.mjs 2>&1 | tail -3 || true

          echo "=== Restart app ==="
          pm2 delete 1dentalai-pms 2>/dev/null || true
          pm2 delete 1dentalai 2>/dev/null || true
          # Kill any stray node process on port 3001
          fuser -k 3001/tcp 2>/dev/null || true
          sleep 2
          set -a; source .env; set +a
          PORT=3001 pm2 start .next/standalone/server.js --name 1dentalai
          pm2 save
          pm2 startup systemd -u root --hp /root 2>/dev/null | tail -1 | bash 2>/dev/null || true
          sleep 8
          curl -s http://127.0.0.1:3001/api/health | grep '"app":"1DentalAI"' && echo "✅ App healthy!" || { echo "Not healthy — logs:"; pm2 logs 1dentalai --lines 20 --nostream; }

          echo "=== Reload nginx ==="
          systemctl reload nginx || true

          sleep 5
          echo "=== Health check ==="
          curl -fsS http://127.0.0.1:3001/api/health && echo "" || echo "Not healthy yet — check: pm2 logs 1dentalai"

          echo "=== DONE ==="
          EOF
