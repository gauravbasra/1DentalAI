name: Emergency Server Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix Docker and restart app
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << 'EOF'
          set -e

          echo "=== Disk usage ==="
          df -h

          echo "=== Docker journal (last error) ==="
          journalctl -u docker -n 30 --no-pager 2>/dev/null || true

          echo "=== Adding swap (prevents OOM during build) ==="
          if [ ! -f /swapfile ]; then
            fallocate -l 2G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
            echo "2GB swap created"
          else
            swapon /swapfile 2>/dev/null || true
            echo "Swap already exists"
          fi
          free -h

          echo "=== Fixing Docker ==="
          systemctl daemon-reload
          systemctl start docker 2>/dev/null || true
          sleep 3
          if systemctl is-active --quiet docker; then
            echo "Docker running OK"
          else
            echo "Docker not running — reinstalling docker.io"
            apt-get purge -y 'docker*' 'containerd*' 2>/dev/null || true
            apt-get autoremove -y 2>/dev/null || true
            apt-get update -q
            DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2
            systemctl daemon-reload
            systemctl enable docker
            systemctl start docker
            sleep 3
            systemctl is-active docker && echo "Docker OK" || { journalctl -u docker -n 20 --no-pager; exit 1; }
          fi

          echo "=== Docker status ==="
          systemctl status docker --no-pager | tail -5

          echo "=== Starting containers ==="
          cd /var/www/1DentalAI
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d postgres
          sleep 5
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d app

          echo "=== Reloading nginx ==="
          systemctl reload nginx || true

          echo "=== Health check ==="
          sleep 5
          curl -fsS http://127.0.0.1:3001/api/health || echo "App not yet healthy"

          echo "=== DONE ==="
          EOF
