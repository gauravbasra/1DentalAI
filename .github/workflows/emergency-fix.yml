name: Emergency Server Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fix Docker and restart app
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" << 'EOF'
          set -e

          echo "=== Disk usage ==="
          df -h

          echo "=== Fixing Docker ==="
          # Fix any broken package state first
          apt-get install -f -y 2>/dev/null || true
          dpkg --configure -a 2>/dev/null || true

          # Remove everything Docker-related cleanly
          systemctl stop docker containerd 2>/dev/null || true
          apt-get purge -y 'docker*' 'containerd*' 2>/dev/null || true
          apt-get autoremove -y 2>/dev/null || true
          rm -f /etc/apt/sources.list.d/docker.list /etc/apt/keyrings/docker.gpg 2>/dev/null || true

          # Install docker.io from Ubuntu repos (no GPG key needed)
          apt-get update -q
          apt-get install -y docker.io docker-compose-v2

          systemctl daemon-reload
          systemctl enable docker
          systemctl start docker
          sleep 3
          systemctl is-active docker && echo "Docker running OK" || (journalctl -u docker -n 20 --no-pager; exit 1)

          echo "=== Docker status ==="
          systemctl status docker --no-pager | tail -5

          echo "=== Starting containers ==="
          cd /var/www/1DentalAI
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d postgres
          sleep 5
          docker compose -f docker-compose.yml -f docker-compose.public.yml up -d app

          echo "=== Reloading nginx ==="
          systemctl reload nginx || true

          echo "=== Health check ==="
          sleep 5
          curl -fsS http://127.0.0.1:3001/api/health || echo "App not yet healthy"

          echo "=== DONE ==="
          EOF
