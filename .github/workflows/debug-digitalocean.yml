name: Debug DigitalOcean 1DentalAI

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH != '' && secrets.DO_DEPLOY_PATH || '/var/www/1DentalAI' }}
      DEPLOY_PORT: ${{ secrets.DO_SSH_PORT != '' && secrets.DO_SSH_PORT || '22' }}
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/do_deploy_key
          chmod 600 ~/.ssh/do_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Print app logs and online scheduling state
        run: |
          ssh -p "${DEPLOY_PORT}" -i ~/.ssh/do_deploy_key -o StrictHostKeyChecking=accept-new "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" <<EOF
            set -e
            cd "${DEPLOY_PATH}"
            docker compose -f docker-compose.yml -f docker-compose.public.yml logs --tail=120 app
            docker compose -f docker-compose.yml -f docker-compose.public.yml exec -T postgres psql -U dentalai_app -d dentalai_prod -c "
              create temporary table qa_appointments as
                select distinct b.\"appointmentId\" as id
                from \"PmsOnlineBooking\" b
                where b.\"appointmentId\" is not null
                  and (b.\"firstName\" in ('QAOnline', 'QAOnline2', 'PWOnline')
                    or b.\"email\" in ('qa-online-booking@example.test', 'qa-online-booking-2@example.test', 'pw-online-booking@example.test')
                    or b.\"patientNote\" ilike '%validation booking%');
              create temporary table qa_patients as
                select distinct b.\"patientId\" as id
                from \"PmsOnlineBooking\" b
                where b.\"patientId\" is not null
                  and (b.\"firstName\" in ('QAOnline', 'QAOnline2', 'PWOnline')
                    or b.\"email\" in ('qa-online-booking@example.test', 'qa-online-booking-2@example.test', 'pw-online-booking@example.test')
                    or b.\"patientNote\" ilike '%validation booking%');
              delete from \"PmsAppointmentStatusHistory\" where \"appointmentId\" in (select id from qa_appointments);
              delete from \"PmsOnlineBooking\"
              where \"firstName\" in ('QAOnline', 'QAOnline2', 'PWOnline')
                 or \"email\" in ('qa-online-booking@example.test', 'qa-online-booking-2@example.test', 'pw-online-booking@example.test')
                 or \"patientNote\" ilike '%validation booking%';
              delete from \"PmsAppointment\" where \"id\" in (select id from qa_appointments);
              delete from \"PmsPatient\" where \"id\" in (select id from qa_patients);
              select count(*) as remaining_qa_bookings
              from \"PmsOnlineBooking\"
              where \"firstName\" in ('QAOnline', 'QAOnline2', 'PWOnline')
                 or \"email\" in ('qa-online-booking@example.test', 'qa-online-booking-2@example.test', 'pw-online-booking@example.test')
                 or \"patientNote\" ilike '%validation booking%';
            "
          EOF
