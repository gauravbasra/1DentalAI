services:
  postgres:
    image: postgres:16-alpine
    container_name: 1dentalai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentalai_prod}
      POSTGRES_USER: ${POSTGRES_USER:-dentalai_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - 1dentalai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: node:22-alpine
    profiles:
      - migrate
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma migrate deploy"

  app:
    build:
      context: .
    container_name: 1dentalai-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  1dentalai-postgres-data:
