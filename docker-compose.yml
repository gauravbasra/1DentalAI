services:
  postgres:
    image: postgres:16-alpine
    container_name: 1dentalai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentalai_prod}
      POSTGRES_USER: ${POSTGRES_USER:-dentalai_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - 1dentalai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: node:22-alpine
    profiles:
      - migrate
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXHEALTH_API_KEY: ${NEXHEALTH_API_KEY:-}
      NEXHEALTH_BASE_URL: ${NEXHEALTH_BASE_URL:-}
      NEXHEALTH_SUBDOMAIN: ${NEXHEALTH_SUBDOMAIN:-}
      NEXHEALTH_SUBDOMAIN_OR_ORG_ID: ${NEXHEALTH_SUBDOMAIN_OR_ORG_ID:-}
      OPENDENTAL_BASE_URL: ${OPENDENTAL_BASE_URL:-}
      OPENDENTAL_API_KEY: ${OPENDENTAL_API_KEY:-}
      OPENDENTAL_PRACTICE_NAME: ${OPENDENTAL_PRACTICE_NAME:-}
      PMS_SYNC_SOURCE: ${PMS_SYNC_SOURCE:-NEXHEALTH}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma migrate deploy"

  app:
    build:
      context: .
    container_name: 1dentalai-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      CONNECTOR_SECRET_KEY: ${CONNECTOR_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_WEBCHAT_MODEL: ${OPENAI_WEBCHAT_MODEL:-}
      OPENAI_BAA_ENABLED: ${OPENAI_BAA_ENABLED:-}
      OPENAI_PHI_ALLOWED: ${OPENAI_PHI_ALLOWED:-}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      ZOOM_WEBHOOK_SECRET_TOKEN: ${ZOOM_WEBHOOK_SECRET_TOKEN:-}
      NEXHEALTH_BASE_URL: ${NEXHEALTH_BASE_URL:-}
      NEXHEALTH_SUBDOMAIN: ${NEXHEALTH_SUBDOMAIN:-}
      NEXHEALTH_SUBDOMAIN_OR_ORG_ID: ${NEXHEALTH_SUBDOMAIN_OR_ORG_ID:-}
      PMS_SYNC_SOURCE: ${PMS_SYNC_SOURCE:-NEXHEALTH}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  1dentalai-postgres-data:
